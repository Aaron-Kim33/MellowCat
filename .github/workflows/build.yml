name: MellowCat Auto Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 1. 수정됨: requirements.txt를 통째로 읽어서 Pillow까지 완벽 설치!
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 2. 수정됨: --add-data "assets;assets" 추가 (이미지 폴더 포장)
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --uac-admin --icon="assets/icon.ico" --add-data "assets;assets" --name "MellowCat_Win" src/main.py

      # 3. 수정됨: 에러를 일으키던 icon.icns 삭제 및 --add-data "assets:assets" 추가 (맥은 : 를 씁니다)
      # (주의: 맥북 빌드 오류를 방지하기 위해 --onefile 옵션도 안전하게 뺐습니다)
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconfirm --windowed --add-data "assets:assets" --name "MellowCat_Mac" src/main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MellowCat-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.app
            dist/*/