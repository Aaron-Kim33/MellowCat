name: MellowCat Auto Build & Release

on:
  push:
    # v1.0, v2.1.3 같은 '태그'를 푸시하면 배포가 시작됩니다.
    tags:
      - 'v*' 

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # 권한 설정 (Release 생성을 위해 필수)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 윈도우 빌드
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --uac-admin --icon="assets/icon.ico" --add-data "assets;assets" --name "MellowCat_Win" src/main.py

      # 맥 빌드 (압축까지 진행)
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconfirm --windowed --add-data "assets:assets" --name "MellowCat_Mac" src/main.py
          cd dist && zip -r MellowCat_Mac.zip MellowCat_Mac.app

      # GitHub Release에 파일 업로드 (여기서 다운로드 링크가 생성됨)
      - name: Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MellowCat_Win.exe
            dist/MellowCat_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}